name: CI

on:
push:
pull_request:

jobs:
verify:
runs-on: ubuntu-latest
steps:
- name: Checkout
uses: actions/checkout@v4

```
  - name: Setup Bun
    uses: oven-sh/setup-bun@v2

  - name: Install dependencies
    run: bun install

  - name: Verify
    run: bun run verify

  - name: Repository contract
    run: bun run repo:contract
```

